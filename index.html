<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Jun 24th 🌷</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Nunito:ital,wght@0,300;0,400;1,300&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --blush: #f9d0e0;
      --rose: #e8799a;
      --hot-pink: #d44e7a;
      --lavender: #d4bfee;
      --purple: #8a5cbf;
      --deep-purple: #5a3580;
      --maroon: #7a1c3c;
      --dark-maroon: #4a0e22;
      --petal: #fce8f0;
      --ink: #2a0e1e;
      --night: #1a0a14;
      --mid-night: #2e0f22;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Nunito', sans-serif;
      background: var(--night);
      color: var(--ink);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    .scene {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .scene.active {
      opacity: 1;
      pointer-events: all;
    }

    /* ════ SOOT TRANSITION ════ */
    #soot-transition {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--night);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.35s ease;
    }

    #soot-transition.show {
      opacity: 1;
      pointer-events: all;
    }

    .soot-cluster {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 200px;
    }

    .soot-sprite {
      background: #1a0a14;
      border-radius: 50%;
      position: relative;
      animation: soot-bounce 0.55s ease-in-out infinite alternate;
      box-shadow: 0 0 8px rgba(212, 78, 122, 0.25);
      flex-shrink: 0;
    }

    .soot-sprite::before,
    .soot-sprite::after {
      content: '';
      position: absolute;
      background: rgba(249, 208, 224, 0.9);
      border-radius: 50%;
      width: 5px;
      height: 5px;
      top: 5px;
    }

    .soot-sprite::before {
      left: 4px;
    }

    .soot-sprite::after {
      right: 4px;
    }

    .soot-sprite:nth-child(1) {
      width: 26px;
      height: 26px;
    }

    .soot-sprite:nth-child(2) {
      width: 20px;
      height: 20px;
      animation-delay: 0.1s;
    }

    .soot-sprite:nth-child(3) {
      width: 16px;
      height: 16px;
      animation-delay: 0.2s;
    }

    .soot-sprite:nth-child(4) {
      width: 22px;
      height: 22px;
      animation-delay: 0.05s;
    }

    .soot-sprite:nth-child(5) {
      width: 18px;
      height: 18px;
      animation-delay: 0.15s;
    }

    @keyframes soot-bounce {
      from {
        transform: translateY(0) scale(1);
      }

      to {
        transform: translateY(-9px) scale(0.9);
      }
    }

    .soot-label {
      color: rgba(249, 208, 224, 0.5);
      font-family: 'Caveat', cursive;
      font-size: 18px;
      letter-spacing: 0.06em;
    }

    /* ════ SCENE 0 — ENVELOPE ════ */
    #scene-loading {
      background: radial-gradient(ellipse at 50% 60%, var(--mid-night) 0%, var(--night) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      gap: 0;
    }

    .stars-bg {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .star {
      position: absolute;
      border-radius: 50%;
      animation: twinkle var(--dur, 3s) ease-in-out infinite;
    }

    @keyframes twinkle {

      0%,
      100% {
        opacity: var(--op, 0.6);
        transform: scale(1);
      }

      50% {
        opacity: 0.08;
        transform: scale(0.4);
      }
    }

    .loading-petal {
      position: absolute;
      font-size: var(--ps, 14px);
      pointer-events: none;
      animation: petal-fall var(--dur, 8s) linear infinite var(--delay, 0s);
      opacity: 0;
    }

    @keyframes petal-fall {
      0% {
        opacity: 0;
        transform: translateY(-20px) rotate(0deg) translateX(0);
      }

      10% {
        opacity: 0.6;
      }

      90% {
        opacity: 0.4;
      }

      100% {
        opacity: 0;
        transform: translateY(100vh) rotate(var(--rot, 360deg)) translateX(var(--dx, 20px));
      }
    }

    .loading-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .loading-title {
      color: rgba(249, 208, 224, 0.55);
      font-family: 'Caveat', cursive;
      font-size: clamp(13px, 3vw, 16px);
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    .envelope-wrap {
      position: relative;
      cursor: pointer;
      filter: drop-shadow(0 6px 28px rgba(212, 78, 122, 0.5));
      animation: float-gentle 3.2s ease-in-out infinite;
    }

    @keyframes float-gentle {

      0%,
      100% {
        transform: translateY(0) rotate(-1.5deg);
      }

      50% {
        transform: translateY(-14px) rotate(1.5deg);
      }
    }

    .envelope-glow {
      position: absolute;
      inset: -22px;
      background: radial-gradient(circle, rgba(212, 78, 122, 0.28) 0%, transparent 70%);
      border-radius: 50%;
      animation: pulse-glow 2.2s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes pulse-glow {

      0%,
      100% {
        transform: scale(1);
        opacity: 0.9;
      }

      50% {
        transform: scale(1.2);
        opacity: 0.35;
      }
    }

    svg.envelope {
      width: min(240px, 64vw);
      height: auto;
    }

    .env-petal {
      position: absolute;
      pointer-events: none;
      animation: env-drift var(--dur, 4s) ease-in-out infinite var(--delay, 0s);
      font-size: var(--size, 15px);
      opacity: 0;
    }

    @keyframes env-drift {
      0% {
        opacity: 0;
        transform: translate(0, 0) rotate(0deg);
      }

      20% {
        opacity: 0.8;
      }

      80% {
        opacity: 0.5;
      }

      100% {
        opacity: 0;
        transform: translate(var(--tx, 20px), var(--ty, -40px)) rotate(var(--rot, 180deg));
      }
    }

    .loading-hint {
      color: rgba(255, 255, 255, 0.65);
      font-family: 'Caveat', cursive;
      font-size: clamp(18px, 4.5vw, 22px);
      text-align: center;
      animation: hint-pulse 2.2s ease-in-out infinite;
      letter-spacing: 0.03em;
    }

    @keyframes hint-pulse {

      0%,
      100% {
        opacity: 0.55;
      }

      50% {
        opacity: 1;
      }
    }

    /* ════ SCENE 1 — TOTORO ════ */
    #scene-totoro {
      background: linear-gradient(180deg, #f0cede 0%, #e8b8d8 45%, #c08aaa 100%);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
    }

    .cloud {
      position: absolute;
      background: rgba(255, 255, 255, 0.82);
      border-radius: 60px;
      animation: cloud-drift var(--dur, 42s) linear infinite;
      filter: blur(0.8px);
      pointer-events: none;
    }

    .cloud .c-bump {
      position: absolute;
      background: rgba(255, 255, 255, 0.82);
      border-radius: 50%;
    }

    @keyframes cloud-drift {
      from {
        transform: translateX(-220px);
      }

      to {
        transform: translateX(calc(100vw + 220px));
      }
    }

    .treeline {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 38%;
      z-index: 1;
      pointer-events: none;
    }

    .totoro-speech-wrap {
      position: relative;
      z-index: 6;
      width: min(320px, 84vw);
      margin-bottom: 18px;
    }

    #totoro-bubble {
      position: relative;
      background: rgba(255, 255, 255, 0.95);
      border: 2px solid #064e3b;
      border-radius: 20px;
      padding: 18px 20px;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.18);
      min-height: 64px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      transform: scale(0.9);
      opacity: 0;
      animation: pop-in 0.5s ease-out forwards;
    }

    #totoro-bubble:active {
      transform: scale(0.93);
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.15);
    }

    #totoro-bubble::after {
      content: '';
      position: absolute;
      bottom: -16px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 14px solid transparent;
      border-right: 14px solid transparent;
      border-top: 17px solid #ffffff;
    }

    #totoro-bubble::before {
      content: '';
      position: absolute;
      bottom: -19px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 15px solid transparent;
      border-right: 15px solid transparent;
      border-top: 19px solid #064e3b;
      z-index: -1;
    }

    @keyframes pop-in {
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    #totoro-speech-text {
      color: #022c22;
      font-weight: 700;
      text-align: center;
      font-size: clamp(13px, 3.5vw, 15px);
      line-height: 1.55;
      font-family: 'Nunito', sans-serif;
    }

    .bubble-tap-hint {
      text-align: center;
      font-family: 'Caveat', cursive;
      font-size: 13px;
      color: rgba(90, 18, 48, 0.55);
      margin-top: 6px;
      animation: hint-pulse 2s ease-in-out infinite;
    }

    .totoro-container {
      position: relative;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: -8px;
    }

    svg.totoro-svg {
      width: min(260px, 56vw);
      height: auto;
      filter: drop-shadow(0 6px 20px rgba(90, 53, 128, 0.3));
      animation: totoro-breathe 4s ease-in-out infinite;
    }

    @keyframes totoro-breathe {

      0%,
      100% {
        transform: scaleY(1) scaleX(1);
      }

      50% {
        transform: scaleY(1.018) scaleX(0.988);
      }
    }

    .ground-strip {
      width: 100%;
      height: 72px;
      background: linear-gradient(180deg, #9a5070 0%, #7a1c3c 100%);
      position: relative;
      z-index: 3;
      flex-shrink: 0;
    }

    .scene-btn {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      background: rgba(255, 255, 255, 0.92);
      border: none;
      border-radius: 50px;
      padding: 11px 30px;
      font-family: 'Caveat', cursive;
      font-size: 20px;
      color: var(--maroon);
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(122, 28, 60, 0.22);
      transition: transform 0.15s, box-shadow 0.15s;
      white-space: nowrap;
      opacity: 0;
      animation: btn-appear 0.6s 5.2s ease forwards;
    }

    .scene-btn:active {
      transform: translateX(-50%) scale(0.95);
      box-shadow: 0 2px 8px rgba(122, 28, 60, 0.2);
    }

    @keyframes btn-appear {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(14px);
      }

      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    /* ════ SCENE 2 — LETTER ════ */
    #scene-letter {
      background: linear-gradient(135deg, #fce8f0 0%, #f0d0e4 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-y: auto;
      padding: 24px 16px 40px;
      -webkit-overflow-scrolling: touch;
      gap: 16px;
    }

    .paper-sheet {
      background: #fff8fb;
      border-radius: 3px;
      padding: clamp(28px, 7vw, 48px) clamp(22px, 6vw, 42px);
      max-width: 580px;
      width: 100%;
      box-shadow: 0 2px 0 #e8c0d0, 0 4px 0 #ddb0c4, 0 10px 40px rgba(122, 28, 60, 0.14), inset 0 0 60px rgba(255, 220, 235, 0.25);
      position: relative;
      background-image: repeating-linear-gradient(transparent, transparent 35px, rgba(212, 78, 122, 0.13) 35px, rgba(212, 78, 122, 0.13) 36px);
      background-position: 0 12px;
      flex-shrink: 0;
    }

    .paper-sheet::before {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      left: clamp(42px, 10.5vw, 62px);
      width: 1.5px;
      background: rgba(212, 78, 122, 0.2);
    }

    .letter-date {
      font-family: 'Caveat', cursive;
      font-size: clamp(13px, 3.2vw, 15px);
      color: var(--rose);
      text-align: right;
      margin-bottom: 10px;
      opacity: 0;
      transition: opacity 0.5s;
    }

    .letter-salutation {
      font-family: 'Caveat', cursive;
      font-size: clamp(20px, 5.5vw, 26px);
      color: var(--maroon);
      font-weight: 700;
      margin-bottom: 6px;
      min-height: 1.3em;
    }

    .letter-body {
      font-family: 'Caveat', cursive;
      font-size: clamp(17px, 4.2vw, 20px);
      color: #3a1020;
      line-height: 2;
      user-select: text;
    }

    .letter-cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--maroon);
      vertical-align: middle;
      margin-left: 1px;
      animation: cursor-blink 0.75s step-end infinite;
    }

    @keyframes cursor-blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0;
      }
    }

    .letter-closing {
      font-family: 'Caveat', cursive;
      font-size: clamp(17px, 4.2vw, 21px);
      color: var(--ink);
      margin-top: 22px;
      opacity: 0;
      transition: opacity 0.8s;
    }

    .letter-signature {
      font-family: 'Caveat', cursive;
      font-size: clamp(22px, 6vw, 28px);
      font-weight: 700;
      color: var(--maroon);
      opacity: 0;
      transition: opacity 0.8s;
    }

    .letter-deco {
      position: absolute;
      font-size: 24px;
      opacity: 0.14;
      pointer-events: none;
    }

    .ld-1 {
      top: 10px;
      left: 10px;
      transform: rotate(-30deg);
    }

    .ld-2 {
      top: 10px;
      right: 10px;
      transform: rotate(30deg);
    }

    .ld-3 {
      bottom: 10px;
      left: 10px;
      transform: rotate(15deg);
    }

    .ld-4 {
      bottom: 10px;
      right: 10px;
      transform: rotate(-15deg);
    }

    /* ── Letter controls row ── */
    .letter-controls {
      display: none;
      flex-direction: row;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      flex-shrink: 0;
      max-width: 580px;
      width: 100%;
    }

    .letter-controls.visible {
      display: flex;
    }

    .letter-ctrl-btn {
      background: rgba(122, 28, 60, 0.1);
      border: 1.5px solid rgba(122, 28, 60, 0.25);
      border-radius: 50px;
      padding: 9px 20px;
      font-family: 'Caveat', cursive;
      font-size: 17px;
      color: var(--maroon);
      cursor: pointer;
      transition: background 0.15s, transform 0.15s;
      opacity: 0;
      animation: fade-up 0.5s ease forwards;
    }

    .letter-ctrl-btn:active {
      transform: scale(0.95);
    }

    .letter-ctrl-btn:hover {
      background: rgba(122, 28, 60, 0.17);
    }

    .letter-action-btn {
      display: none;
      background: linear-gradient(135deg, var(--hot-pink), var(--maroon));
      border: none;
      border-radius: 50px;
      padding: 13px 36px;
      font-family: 'Caveat', cursive;
      font-size: 21px;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(122, 28, 60, 0.35);
      transition: transform 0.15s;
      flex-shrink: 0;
      opacity: 0;
      animation: fade-up 0.7s ease forwards;
    }

    .letter-action-btn:active {
      transform: scale(0.96);
    }

    @keyframes fade-up {
      from {
        opacity: 0;
        transform: translateY(14px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    #scene-letter::-webkit-scrollbar {
      width: 3px;
    }

    #scene-letter::-webkit-scrollbar-track {
      background: transparent;
    }

    #scene-letter::-webkit-scrollbar-thumb {
      background: rgba(212, 78, 122, 0.3);
      border-radius: 2px;
    }

    /* ════ SCENE 3 — WISH LANTERN ════ */
    #scene-lantern {
      background: radial-gradient(ellipse at 50% 80%, #3a0820 0%, #1a0a14 70%);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 20px 0 0;
    }

    .lantern-stars {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .lantern-title {
      position: relative;
      z-index: 5;
      font-family: 'Caveat', cursive;
      font-size: clamp(24px, 6.5vw, 34px);
      color: rgba(255, 255, 255, 0.88);
      text-align: center;
      margin-bottom: 4px;
      text-shadow: 0 0 24px rgba(212, 78, 122, 0.7);
      padding: 0 20px;
    }

    .lantern-sub {
      position: relative;
      z-index: 5;
      font-family: 'Nunito', sans-serif;
      font-size: clamp(12px, 3vw, 14px);
      color: rgba(255, 255, 255, 0.4);
      text-align: center;
      margin-bottom: 28px;
      padding: 0 28px;
      line-height: 1.5;
    }

    .wish-input-wrap {
      position: relative;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 0 24px;
    }

    .wish-input {
      width: 100%;
      max-width: 370px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(212, 78, 122, 0.35);
      border-radius: 16px;
      padding: 15px 18px;
      font-family: 'Caveat', cursive;
      font-size: clamp(18px, 4.5vw, 22px);
      color: #fff;
      text-align: center;
      outline: none;
      transition: border-color 0.3s, background 0.3s;
      caret-color: var(--rose);
    }

    .wish-input::placeholder {
      color: rgba(255, 255, 255, 0.22);
    }

    .wish-input:focus {
      border-color: rgba(212, 78, 122, 0.7);
      background: rgba(255, 255, 255, 0.11);
    }

    .wish-btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .release-btn {
      background: linear-gradient(135deg, var(--hot-pink), var(--maroon));
      border: none;
      border-radius: 50px;
      padding: 13px 38px;
      font-family: 'Caveat', cursive;
      font-size: clamp(20px, 5vw, 24px);
      color: #fff;
      cursor: pointer;
      box-shadow: 0 4px 22px rgba(212, 78, 122, 0.55);
      transition: transform 0.15s;
    }

    .release-btn:active {
      transform: scale(0.95);
    }

    .view-wishes-btn {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(212, 78, 122, 0.4);
      border-radius: 50px;
      padding: 13px 28px;
      font-family: 'Caveat', cursive;
      font-size: clamp(18px, 4.5vw, 22px);
      color: rgba(255, 255, 255, 0.75);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      display: none;
    }

    .view-wishes-btn:active {
      transform: scale(0.95);
    }

    .view-wishes-btn.visible {
      display: block;
    }

    /* flying lanterns — bigger */
    .flying-lantern {
      position: absolute;
      z-index: 6;
      display: flex;
      flex-direction: column;
      align-items: center;
      pointer-events: none;
      animation: lantern-fly var(--fly-dur, 8s) ease-in forwards;
    }

    @keyframes lantern-fly {
      0% {
        opacity: 0;
        transform: translateY(0) translateX(0) rotate(0deg) scale(0.75);
      }

      10% {
        opacity: 1;
      }

      82% {
        opacity: 0.88;
      }

      100% {
        opacity: 0;
        transform: translateY(-115vh) translateX(var(--drift, 30px)) rotate(var(--rot, 8deg)) scale(1.1);
      }
    }

    .lantern-body {
      width: var(--lw, 110px);
      height: var(--lh, 140px);
      background: radial-gradient(ellipse at 38% 32%, #f9d0e0 0%, var(--hot-pink) 45%, var(--maroon) 100%);
      border-radius: 50% 50% 42% 42% / 42% 42% 58% 58%;
      box-shadow: 0 0 24px rgba(212, 78, 122, 0.9), 0 0 48px rgba(212, 78, 122, 0.45), inset 0 -8px 18px rgba(249, 208, 224, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
    }

    .lantern-wish-text {
      font-family: 'Caveat', cursive;
      font-size: clamp(14px, 3.5vw, 17px);
      color: rgba(60, 0, 20, 0.9);
      text-align: center;
      line-height: 1.35;
      word-break: break-word;
      max-width: 90%;
      font-weight: 600;
    }

    .lantern-string {
      width: 1.5px;
      height: 20px;
      background: rgba(212, 78, 122, 0.55);
    }

    .lantern-bottom {
      width: 24px;
      height: 9px;
      background: rgba(122, 28, 60, 0.65);
      border-radius: 0 0 5px 5px;
      box-shadow: 0 2px 10px rgba(212, 78, 122, 0.55);
    }

    .wish-log {
      position: relative;
      z-index: 5;
      margin-top: 12px;
      font-family: 'Caveat', cursive;
      font-size: clamp(13px, 3.2vw, 15px);
      color: rgba(255, 255, 255, 0.32);
      text-align: center;
      padding: 0 20px;
      min-height: 20px;
    }

    .mote {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      animation: mote-float var(--dur, 6s) ease-in-out infinite var(--delay, 0s);
    }

    @keyframes mote-float {

      0%,
      100% {
        transform: translate(0, 0);
        opacity: 0;
      }

      20% {
        opacity: 1;
      }

      50% {
        transform: translate(var(--mx, 25px), var(--my, -20px));
        opacity: 0.7;
      }

      80% {
        opacity: 1;
      }
    }

    .lantern-action-btn {
      display: none;
      position: relative;
      z-index: 5;
      margin-top: 16px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(212, 78, 122, 0.4);
      border-radius: 50px;
      padding: 11px 30px;
      font-family: 'Caveat', cursive;
      font-size: 19px;
      color: rgba(255, 255, 255, 0.75);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      opacity: 0;
      animation: fade-up 0.6s ease forwards;
    }

    .lantern-action-btn:active {
      transform: scale(0.96);
    }

    /* ════ WISH GALLERY MODAL ════ */
    #wish-gallery {
      position: fixed;
      inset: 0;
      z-index: 8888;
      background: rgba(20, 5, 15, 0.92);
      backdrop-filter: blur(6px);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 32px;
      overflow-y: auto;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    #wish-gallery.open {
      opacity: 1;
      pointer-events: all;
    }

    .gallery-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 500px;
      margin-bottom: 20px;
      flex-shrink: 0;
    }

    .gallery-title {
      font-family: 'Caveat', cursive;
      font-size: clamp(22px, 5.5vw, 28px);
      color: rgba(249, 208, 224, 0.92);
      text-shadow: 0 0 18px rgba(212, 78, 122, 0.5);
    }

    .gallery-close {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(212, 78, 122, 0.35);
      border-radius: 50%;
      width: 38px;
      height: 38px;
      font-family: 'Caveat', cursive;
      font-size: 20px;
      color: rgba(255, 255, 255, 0.6);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .gallery-close:active {
      background: rgba(255, 255, 255, 0.16);
    }

    .gallery-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 500px;
    }

    .gallery-card {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(212, 78, 122, 0.25);
      border-radius: 16px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .gallery-lantern-mini {
      flex-shrink: 0;
      width: 46px;
      height: 60px;
      background: radial-gradient(ellipse at 38% 32%, #f9d0e0 0%, var(--hot-pink) 55%, var(--maroon) 100%);
      border-radius: 50% 50% 42% 42% / 42% 42% 58% 58%;
      box-shadow: 0 0 14px rgba(212, 78, 122, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .gallery-lantern-mini span {
      font-size: 10px;
      color: rgba(60, 0, 20, 0.8);
      font-family: 'Caveat', cursive;
      font-weight: 700;
      text-align: center;
      padding: 4px;
      line-height: 1.2;
      word-break: break-word;
    }

    .gallery-card-content {
      flex: 1;
    }

    .gallery-wish-text {
      font-family: 'Caveat', cursive;
      font-size: clamp(18px, 4.5vw, 22px);
      color: rgba(249, 208, 224, 0.9);
      line-height: 1.3;
    }

    .gallery-wish-num {
      font-family: 'Nunito', sans-serif;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.28);
      margin-top: 3px;
    }

    .gallery-empty {
      font-family: 'Caveat', cursive;
      font-size: 20px;
      color: rgba(255, 255, 255, 0.25);
      text-align: center;
      margin-top: 40px;
    }

    #wish-gallery::-webkit-scrollbar {
      width: 3px;
    }

    #wish-gallery::-webkit-scrollbar-track {
      background: transparent;
    }

    #wish-gallery::-webkit-scrollbar-thumb {
      background: rgba(212, 78, 122, 0.3);
      border-radius: 2px;
    }

    /* ════════════════════════════
     SCENE 4 — FINALE
  ════════════════════════════ */
    #scene-finale {
      background: radial-gradient(ellipse at 50% 60%, #3a0820 0%, var(--night) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 18px;
      padding: 28px 24px;
      overflow: hidden;
    }

    .finale-totoro {
      animation: fin-float 3.2s ease-in-out infinite;
    }

    @keyframes fin-float {

      0%,
      100% {
        transform: translateY(0) rotate(-2deg);
      }

      50% {
        transform: translateY(-14px) rotate(2deg);
      }
    }

    .finale-totoro svg {
      width: min(120px, 34vw);
      filter: drop-shadow(0 0 18px rgba(212, 78, 122, 0.6));
    }

    .finale-text {
      font-family: 'Caveat', cursive;
      font-size: clamp(26px, 7vw, 40px);
      color: #fff;
      line-height: 1.2;
      text-shadow: 0 0 28px rgba(212, 78, 122, 0.55);
      padding: 0 10px;
    }

    .finale-sub {
      font-family: 'Nunito', sans-serif;
      font-style: italic;
      font-size: clamp(13px, 3.3vw, 16px);
      color: rgba(255, 255, 255, 0.5);
      max-width: 320px;
      line-height: 1.5;
    }

    .finale-hearts {
      display: flex;
      gap: 14px;
      font-size: 28px;
    }

    .finale-heart {
      animation: heart-beat 1.3s ease-in-out infinite var(--delay, 0s);
      display: inline-block;
    }

    @keyframes heart-beat {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.35);
      }
    }

    .replay-btn {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 50px;
      padding: 9px 26px;
      font-family: 'Caveat', cursive;
      font-size: 17px;
      color: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      transition: border-color 0.25s, color 0.25s;
      margin-top: 4px;
    }

    .replay-btn:hover {
      border-color: rgba(255, 255, 255, 0.55);
      color: #fff;
    }

    .replay-btn:active {
      transform: scale(0.96);
    }

    /* confetti */
    .confetti-piece {
      position: absolute;
      width: 7px;
      height: 7px;
      border-radius: 2px;
      animation: confetti-fall var(--dur, 3s) ease-in forwards var(--delay, 0s);
      pointer-events: none;
    }

    @keyframes confetti-fall {
      0% {
        transform: translateY(-20px) rotate(0deg) translateX(0);
        opacity: 1;
      }

      100% {
        transform: translateY(102vh) rotate(var(--rot, 720deg)) translateX(var(--dx, 30px));
        opacity: 0;
      }
    }

    /* utility */
    @keyframes fade-up {
      from {
        opacity: 0;
        transform: translateY(14px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <audio id="bg-music" loop>
    <source src="bg-music.wav" type="audio/wav">

  <!-- ── SOOT SPRITE TRANSITION ── -->

  <!-- ══ WISH GALLERY MODAL ══ -->

  <!-- ══ SCENE 2: LETTER ══ -->

      <div class="wish-btn-row">
        <button class="release-btn" onclick="releaseLantern()">release ✦</button>
        <button class="view-wishes-btn" id="view-wishes-btn" onclick="openGallery()">view wishes 🏮</button>

  <!-- ══ SCENE 4: FINALE ══ -->

        <path

        <path d="M 55,145 C 50,115 150,115 145,145 C 150,185 145,225 100,225 C 55,225 50,185 55,145 Z" fill="#fdfbf7" />
        <path d="M 80,135 Q 90,125 100,135" fill="none" stroke="#71797e" stroke-width="5" stroke-linecap="round" />
        <path d="M 105,135 Q 115,125 125,135" fill="none" stroke="#71797e" stroke-width="5" stroke-linecap="round" />
        <path d="M 68,155 Q 78,145 88,155" fill="none" stroke="#71797e" stroke-width="5" stroke-linecap="round" />
        <path d="M 95,155 Q 105,145 115,155" fill="none" stroke="#71797e" stroke-width="5" stroke-linecap="round" />
        <path d="M 122,155 Q 132,145 142,155" fill="none" stroke="#71797e" stroke-width="5" stroke-linecap="round" />
        <circle cx="75" cy="90" r="10" fill="white" stroke="#4a4e51" stroke-width="1.5" />
        <circle cx="75" cy="90" r="4" fill="black" />
        <circle cx="125" cy="90" r="10" fill="white" stroke="#4a4e51" stroke-width="1.5" />
        <circle cx="125" cy="90" r="4" fill="black" />
        <circle cx="73" cy="88" r="1.5" fill="white" />
        <circle cx="123" cy="88" r="1.5" fill="white" />
        <polygon points="94,88 106,88 100,94" fill="black" />
        <line x1="45" y1="98" x2="15" y2="95" stroke="black" stroke-width="2.5" stroke-linecap="round" />
        <line x1="45" y1="104" x2="10" y2="104" stroke="black" stroke-width="2.5" stroke-linecap="round" />
        <line x1="45" y1="110" x2="18" y2="113" stroke="black" stroke-width="2.5" stroke-linecap="round" />
        <line x1="155" y1="98" x2="185" y2="95" stroke="black" stroke-width="2.5" stroke-linecap="round" />
        <line x1="155" y1="104" x2="190" y2="104" stroke="black" stroke-width="2.5" stroke-linecap="round" />
        <line x1="155" y1="110" x2="182" y2="113" stroke="black" stroke-width="2.5" stroke-linecap="round" />
        <path id="totoro-mouth" d="M 90,104 Q 100,109 110,104" fill="none" stroke="black" stroke-width="3"
          stroke-linecap="round" />
        <ellipse cx="60" cy="102" rx="7" ry="3.5" fill="#ffa8a8" opacity="0.6" />
        <ellipse cx="140" cy="102" rx="7" ry="3.5" fill="#ffa8a8" opacity="0.6" />
        <path d="M 38,130 C 20,150 18,180 35,190" fill="none" stroke="#71797e" stroke-width="12"
          stroke-linecap="round" />
        <path d="M 162,130 C 180,150 182,180 165,190" fill="none" stroke="#71797e" stroke-width="12"
          stroke-linecap="round" />
      </svg>
    </div>
    <div class="finale-text" id="finale-text"></div>
    <div class="finale-sub">one month down. a lifetime of moments to go. 🌸</div>
    <div class="finale-hearts">
      <span class="finale-heart" style="--delay:0s">💜</span>
      <span class="finale-heart" style="--delay:0.2s">🌸</span>
      <span class="finale-heart" style="--delay:0.4s">💜</span>
    </div>
    <button class="replay-btn" onclick="replayFromStart()">↩ experience again</button>
  </div>

  <script>
    const GIRLFRIEND_NAME = "kassy";
    const YOUR_NAME = "pat";

    const LETTER_TEXT = `I honestly didn't expect to feel this much in just one month. But here we are.

You came into my life like a soft breeze — gentle, warm, and impossible to ignore. Every conversation with you feels like home. Every time I see your name pop up on my screen, something in my chest just... lights up.

I love how you laugh. I love how you think. I love how you make even the most ordinary moments feel worth remembering.

You deserve the whole world, you know. And while I can't give you that in one month, I want to spend every month after this trying.

Thank you for the late nights. The random stories. The "sana okay ka" messages. The way you let me be myself without making me feel weird about it.

This is just the beginning of something I really, really hope goes on for a long time.

Happy 1st monthsary. 💕`;

    const TOTORO_LINES = [
      "*Yawn* TAP ME! I have things to tell you!",
      "hey kassy... 👀",
      "pat asked me to deliver something special...",
      "today marks 1 whole month! 🎉",
      "one month of \"kumain ka na?\" and \"sana okay ka\"...",
      "one month of choosing each other, every single day 💜",
      "pat made you something. click the button below when you're ready~",
    ];

    /* ── state ── */
    let currentScene = 'loading';
    let totoroLineIdx = 0;
    let totoroTriggered = false;
    let letterDone = false;
    let wishCount = 0;
    let wishes = [];

    /* typewriter state */
    let typewriterActive = false;
    let typewriterAbort = false;

    /* ── Stars ── */
    function makeStars(containerId, count) {
      const c = document.getElementById(containerId);
      if (!c) return;
      for (let i = 0; i < count; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        const size = Math.random() * 2.4 + 0.7;
        const hue = Math.random() > 0.5 ? '320' : '270';
        s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random() * 100}%;top:${Math.random() * 100}%;background:hsl(${hue},60%,90%);--dur:${2 + Math.random() * 4}s;--op:${0.25 + Math.random() * 0.7};animation-delay:${Math.random() * 4}s;`;
        c.appendChild(s);
      }
    }

    function makePetals() {
      const bg = document.getElementById('scene-loading');
      const emojis = ['🌸', '💜', '🌸', '🌷', '💕'];
      for (let i = 0; i < 14; i++) {
        const p = document.createElement('div');
        p.className = 'loading-petal';
        p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        p.style.cssText = `left:${Math.random() * 100}%;top:-30px;--ps:${12 + Math.random() * 10}px;--dur:${6 + Math.random() * 6}s;--delay:${Math.random() * 5}s;--rot:${(Math.random() - 0.5) * 720}deg;--dx:${(Math.random() - 0.5) * 60}px;`;
        bg.appendChild(p);
      }
    }

    /* ── Totoro speech ── */
    function advanceTotoroSpeech() {
      totoroLineIdx = Math.min(totoroLineIdx + 1, TOTORO_LINES.length - 1);
      const el = document.getElementById('totoro-speech-text');
      const mouth = document.getElementById('totoro-mouth');
      el.style.opacity = '0';
      el.style.transition = 'opacity 0.2s';
      setTimeout(() => {
        el.textContent = TOTORO_LINES[totoroLineIdx];
        el.style.opacity = '1';
      }, 200);
      const mouthShapes = [109, 109, 112, 115, 109, 115, 118];
      const openness = mouthShapes[totoroLineIdx] ?? 112;
      mouth.setAttribute('d', `M 90,104 Q 100,${openness} 110,104`);
      if (totoroLineIdx === TOTORO_LINES.length - 1) {
        document.getElementById('bubble-tap-hint').style.opacity = '0';
        const btn = document.getElementById('totoro-next-btn');
        btn.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
        btn.style.opacity = '1';
        btn.style.transform = 'translateX(-50%) translateY(0)';
        btn.style.pointerEvents = 'all';
      }
    }

    /* ── Soot transition ── */
    function sootTransition(cb) {
      const el = document.getElementById('soot-transition');
      el.classList.add('show');
      setTimeout(() => {
        cb();
        setTimeout(() => el.classList.remove('show'), 600);
      }, 850);
    }

    function goToScene(name) {
      sootTransition(() => {
        document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
        const next = document.getElementById('scene-' + name);
        if (!next) return;
        next.classList.add('active');
        currentScene = name;
        if (name === 'totoro' && !totoroTriggered) totoroTriggered = true;
        if (name === 'letter') setTimeout(startLetter, 300);
      });
    }

    /* ── Scene 0 ── */
    function openEnvelope() {
      const music = document.getElementById('bg-music');
      music.volume = 1;
      music.playbackRate = 1.25;
      music.play().catch(() => { });

      const wrap = document.getElementById('envelope-wrap');
      wrap.style.transition = 'transform 0.32s ease, opacity 0.32s ease';
      wrap.style.transform = 'scale(1.18)';
      wrap.style.opacity = '0';
      setTimeout(() => goToScene('totoro'), 360);
    }

    /* ════════════════════════════
       SCENE 2: LETTER
    ════════════════════════════ */
    function startLetter() {
      // reset state
      letterDone = false;
      typewriterAbort = false;

      const dateEl = document.getElementById('letter-date');
      const salEl = document.getElementById('letter-salutation');
      const bodyEl = document.getElementById('letter-body');
      const closingEl = document.getElementById('letter-closing');
      const sigEl = document.getElementById('letter-signature');
      const nextBtn = document.getElementById('letter-next-btn');
      const controls = document.getElementById('letter-controls');
      const skipBtn = document.getElementById('skip-btn');
      const replayBtn = document.getElementById('replay-btn');

      // reset visuals
      dateEl.style.opacity = '0';
      dateEl.textContent = '';
      salEl.textContent = '';
      bodyEl.innerHTML = '';
      closingEl.textContent = '';
      closingEl.style.opacity = '0';
      sigEl.textContent = '';
      sigEl.style.opacity = '0';
      nextBtn.style.display = 'none';
      controls.classList.remove('visible');
      skipBtn.style.display = 'inline-block';
      replayBtn.style.display = 'none';

      dateEl.textContent = 'June 24, 2026';
      dateEl.style.opacity = '1';

      // Show skip button immediately
      controls.classList.add('visible');

      typewriterActive = true;

      typewriterInto(salEl, `hey, ${GIRLFRIEND_NAME} 💌`, 52, 420, () => {
        if (typewriterAbort) return;
        const cursor = document.createElement('span');
        cursor.className = 'letter-cursor';
        cursor.id = 'live-cursor';
        bodyEl.appendChild(cursor);

        let idx = 0;
        const BASE_SPEED = 26;

        function typeBody() {
          if (typewriterAbort) { cursor.remove(); return; }
          if (idx < LETTER_TEXT.length) {
            const ch = LETTER_TEXT[idx];
            if (ch === '\n') { cursor.before(document.createElement('br')); }
            else { cursor.before(document.createTextNode(ch)); }
            idx++;
            setTimeout(typeBody, ch === '\n' ? BASE_SPEED * 6 : BASE_SPEED + Math.random() * 16);
          } else {
            cursor.remove();
            finishLetter();
          }
        }
        setTimeout(typeBody, 900);
      });
    }

    function finishLetter() {
      const closingEl = document.getElementById('letter-closing');
      const sigEl = document.getElementById('letter-signature');
      const nextBtn = document.getElementById('letter-next-btn');
      const skipBtn = document.getElementById('skip-btn');
      const replayBtn = document.getElementById('replay-btn');

      closingEl.textContent = 'always yours,';
      closingEl.style.opacity = '1';
      setTimeout(() => {
        sigEl.textContent = YOUR_NAME + ' 🌸';
        sigEl.style.opacity = '1';
        letterDone = true;
        typewriterActive = false;

        // swap skip → replay
        skipBtn.style.display = 'none';
        replayBtn.style.display = 'inline-block';
        replayBtn.style.animation = 'none';
        replayBtn.offsetHeight;
        replayBtn.style.animation = 'fade-up 0.5s ease forwards';

        nextBtn.style.display = 'block';
        nextBtn.style.animation = 'none';
        nextBtn.offsetHeight;
        nextBtn.style.animation = 'fade-up 0.7s ease forwards';
      }, 820);
    }

    /* Skip: instantly show full letter */
    function skipLetter() {
      if (letterDone) return;
      typewriterAbort = true;

      const salEl = document.getElementById('letter-salutation');
      const bodyEl = document.getElementById('letter-body');

      // Remove any in-progress cursor
      const oldCursor = document.getElementById('live-cursor');
      if (oldCursor) oldCursor.remove();

      salEl.textContent = `hey, ${GIRLFRIEND_NAME} 💌`;

      // Build body instantly
      bodyEl.innerHTML = '';
      const lines = LETTER_TEXT.split('\n');
      lines.forEach((line, i) => {
        bodyEl.appendChild(document.createTextNode(line));
        if (i < lines.length - 1) bodyEl.appendChild(document.createElement('br'));
      });

      finishLetter();
    }

    /* Replay: re-run typewriter from scratch */
    function replayLetter() {
      startLetter();
    }

    function typewriterInto(el, text, speed, startDelay, onDone) {
      let i = 0;
      function tick() {
        if (typewriterAbort) { if (onDone) { } return; }
        if (i < text.length) {
          el.textContent += text[i++];
          setTimeout(tick, speed + Math.random() * 18);
        } else if (onDone) onDone();
      }
      setTimeout(tick, startDelay);
    }

    /* ════════════════════════════
       SCENE 3: LANTERNS
    ════════════════════════════ */
    function spawnMotes() {
      const container = document.getElementById('scene-lantern');
      for (let i = 0; i < 20; i++) {
        const m = document.createElement('div');
        m.className = 'mote';
        const size = 3 + Math.random() * 3;
        const pink = Math.random() > 0.5;
        m.style.cssText = `width:${size}px;height:${size}px;left:${Math.random() * 100}%;top:${Math.random() * 100}%;background:${pink ? 'rgba(212,78,122,0.85)' : 'rgba(138,92,191,0.75)'};box-shadow:0 0 ${size * 2}px ${pink ? 'rgba(212,78,122,0.7)' : 'rgba(138,92,191,0.6)'};--dur:${4 + Math.random() * 5}s;--delay:${Math.random() * 3}s;--mx:${(Math.random() - 0.5) * 55}px;--my:${(Math.random() - 0.5) * 45}px;`;
        container.appendChild(m);
      }
    }

    function releaseLantern() {
      const inp = document.getElementById('wish-input');
      const wish = inp.value.trim();
      if (!wish) {
        inp.style.borderColor = 'rgba(255,80,80,0.55)';
        inp.placeholder = 'type a wish first 💕';
        setTimeout(() => { inp.style.borderColor = ''; inp.placeholder = 'type your wish here…'; }, 1200);
        return;
      }
      inp.value = '';
      wishCount++;
      wishes.push(wish);

      localStorage.setItem('monthsary_wishes', JSON.stringify(wishes));

      const container = document.getElementById('scene-lantern');
      const lantern = document.createElement('div');
      lantern.className = 'flying-lantern';

      const startX = 20 + Math.random() * 60;
      const drift = (Math.random() - 0.5) * 90;
      const rot = (Math.random() - 0.5) * 22;
      const flyDur = 7 + Math.random() * 5;

      lantern.style.cssText = `left:${startX}%;bottom:18%;--fly-dur:${flyDur}s;--drift:${drift}px;--rot:${rot}deg;`;
      lantern.innerHTML = `
        <div class="lantern-body">
          <div class="lantern-wish-text">${escapeHtml(wish)}</div>
        </div>
        <div class="lantern-string"></div>
        <div class="lantern-bottom"></div>
      `;
      container.appendChild(lantern);
      setTimeout(() => lantern.remove(), (flyDur + 0.6) * 1000);

      document.getElementById('wish-log').textContent = `✦ wish #${wishCount} released to the stars ✦`;

      // Show view wishes button after first wish
      const viewBtn = document.getElementById('view-wishes-btn');
      viewBtn.classList.add('visible');

      if (wishCount === 1) {
        const btn = document.getElementById('lantern-next-btn');
        btn.style.display = 'block';
        btn.style.animation = 'none';
        btn.offsetHeight;
        btn.style.animation = 'fade-up 0.6s ease forwards';
      }
    }

    /* ── Wish Gallery ── */
    function openGallery() {
      renderGallery();
      document.getElementById('wish-gallery').classList.add('open');
    }

    function closeGallery() {
      document.getElementById('wish-gallery').classList.remove('open');
    }

    function renderGallery() {
      const grid = document.getElementById('gallery-grid');
      grid.innerHTML = '';
      if (wishes.length === 0) {
        grid.innerHTML = '<div class="gallery-empty">no wishes released yet 🌙</div>';
        return;
      }
      wishes.forEach((wish, i) => {
        const card = document.createElement('div');
        card.className = 'gallery-card';
        card.innerHTML = `
          <div class="gallery-lantern-mini">
            <span>${escapeHtml(wish.substring(0, 12))}${wish.length > 12 ? '…' : ''}</span>
          </div>
          <div class="gallery-card-content">
            <div class="gallery-wish-text">${escapeHtml(wish)}</div>
            <div class="gallery-wish-num">wish #${i + 1} · released to the stars ✦</div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeGallery();
      if (currentScene === 'lantern' && e.key === 'Enter') releaseLantern();
    });

    // close gallery on backdrop tap
    document.getElementById('wish-gallery').addEventListener('click', function (e) {
      if (e.target === this) closeGallery();
    });

    function escapeHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    /* ── Scene 4: Finale ── */
    function startFinale() {
      const el = document.getElementById('finale-text');
      const text = `happy 1st monthsary, ${GIRLFRIEND_NAME} 💕`;
      setTimeout(() => typewriterInto(el, text, 48, 380, spawnConfetti), 200);
    }

    function spawnConfetti() {
      const colors = [
        '#f9d0e0', '#d44e7a', '#8a5cbf', '#5a3580',
        '#7a1c3c', '#d4bfee', '#e8799a', '#f0b8ce'
      ];
      const scene = document.getElementById('scene-finale');
      for (let i = 0; i < 65; i++) {
        const c = document.createElement('div');
        c.className = 'confetti-piece';
        c.style.cssText = `
      left:${Math.random() * 100}%;
      top:-10px;
      background:${colors[Math.floor(Math.random() * colors.length)]};
      --dur:${2 + Math.random() * 3.5}s;
      --delay:${Math.random() * 2}s;
      --rot:${360 + Math.random() * 360}deg;
      --dx:${(Math.random() - 0.5) * 110}px;
      transform:rotate(${Math.random() * 360}deg);
      border-radius:${Math.random() > 0.45 ? '50%' : '2px'};
    `;
        scene.appendChild(c);
        setTimeout(() => c.remove(), 7000);
      }
    }

    /* ── Replay ── */
    function replayFromStart() {
      totoroTriggered = false;
      letterDone = false;
      wishCount = 0;

      document.getElementById('letter-salutation').textContent = '';
      document.getElementById('letter-body').innerHTML = '';
      const dateEl = document.getElementById('letter-date');
      dateEl.textContent = ''; dateEl.style.opacity = '0';
      const closingEl = document.getElementById('letter-closing');
      closingEl.textContent = ''; closingEl.style.opacity = '0';
      const sigEl = document.getElementById('letter-signature');
      sigEl.textContent = ''; sigEl.style.opacity = '0';

      const lBtn = document.getElementById('letter-next-btn');
      lBtn.style.display = 'none'; lBtn.style.animation = 'none';

      document.getElementById('wish-log').textContent = '';
      const wBtn = document.getElementById('lantern-next-btn');
      wBtn.style.display = 'none'; wBtn.style.animation = 'none';

      document.getElementById('finale-text').textContent = '';
      document.getElementById('lantern-stars').innerHTML = '';
      document.getElementById('finale-stars').innerHTML = '';
      document.querySelectorAll('.mote').forEach(m => m.remove());

      const wrap = document.getElementById('envelope-wrap');
      wrap.style.transition = 'none';
      wrap.style.transform = '';
      wrap.style.opacity = '1';

      goToScene('loading');
    }

    /* ── INIT ── */
    const saved = localStorage.getItem('monthsary_wishes');
    if (saved) { try { wishes = JSON.parse(saved); wishCount = wishes.length; if (wishCount > 0) document.getElementById('view-wishes-btn').classList.add('visible'); } catch (e) { } }
    makeStars('stars-bg', 95);
    makePetals();
    spawnMotes();
  </script>
</body>
