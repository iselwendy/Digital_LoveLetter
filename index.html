<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Jun 24th 🌷</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Nunito:ital,wght@0,300;0,400;1,300&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <button id="volume-btn" aria-label="Toggle music" onclick="toggleVolume()">🔊</button>

  <audio id="bg-music" loop>
    <source src="bg-music.wav" type="audio/wav">
  </audio>

  <!-- ── SOOT SPRITE TRANSITION ── -->
  <div id="soot-transition">
    <div class="soot-cluster">
      <div class="soot-sprite"></div>
      <div class="soot-sprite"></div>
      <div class="soot-sprite"></div>
      <div class="soot-sprite"></div>
      <div class="soot-sprite"></div>
    </div>
    <div class="soot-label">✦ carrying you there ✦</div>
  </div>

  <!-- ══ WISH GALLERY MODAL ══ -->
  <div id="wish-gallery">
    <div class="gallery-header">
      <div class="gallery-title">🏮 your wishes</div>
      <button class="gallery-close" onclick="closeGallery()">✕</button>
    </div>
    <div class="gallery-grid" id="gallery-grid">
      <div class="gallery-empty">no wishes released yet 🌙</div>
    </div>
  </div>

  <!-- ══ SCENE 0: LOADING ══ -->
  <div id="scene-loading" class="scene active" onclick="openEnvelope()">
    <div class="stars-bg" id="stars-bg"></div>
    <div class="loading-content">
      <div class="loading-title">June 24, 2026</div>
      <div class="envelope-wrap" id="envelope-wrap">
        <div class="envelope-glow"></div>
        <span class="env-petal"
          style="--dur:3.4s;--delay:0s;--tx:-32px;--ty:-52px;--rot:-110deg;--size:17px;top:42%;left:-12px">🌸</span>
        <span class="env-petal"
          style="--dur:4s;--delay:0.8s;--tx:28px;--ty:-58px;--rot:140deg;--size:13px;top:28%;right:-10px">🌸</span>
        <span class="env-petal"
          style="--dur:3s;--delay:1.5s;--tx:-18px;--ty:-44px;--rot:75deg;--size:11px;top:60%;left:8px">💜</span>
        <span class="env-petal"
          style="--dur:4.6s;--delay:0.3s;--tx:38px;--ty:-66px;--rot:-190deg;--size:15px;top:50%;right:4px">🌸</span>
        <svg class="envelope" viewBox="0 0 240 180" xmlns="http://www.w3.org/2000/svg">
          <rect x="4" y="40" width="232" height="136" rx="15" fill="#f9d0e0" stroke="#d44e7a" stroke-width="1.8" />
          <path d="M4 60 Q4 40 15 40 L 100 95 Q 105 100 100 105 L 15 176 Q 4 176 4 156 Z" fill="#edaac2"
            stroke="#d44e7a" stroke-width="0.8" />
          <path d="M236 60 Q236 40 225 40 L 140 95 Q 135 100 140 105 L 225 176 Q 236 176 236 156 Z" fill="#edaac2"
            stroke="#d44e7a" stroke-width="0.8" />
          <path d="M 15 40 Q 4 40 4 50 L 112 114 Q 120 125 128 114 L 236 50 Q 236 40 225 40 Z" fill="#f0b8ce"
            stroke="#d44e7a" stroke-width="1.2" />
          <circle cx="120" cy="115" r="17" fill="#8a5cbf" opacity="0.9" />
          <text x="120" y="121" text-anchor="middle" font-size="17" fill="white" font-family="serif">✿</text>
          <text x="58" y="74" font-size="13" opacity="0.4" transform="rotate(-22,58,74)">🌸</text>
          <text x="173" y="70" font-size="11" opacity="0.4" transform="rotate(18,173,70)">💜</text>
        </svg>
      </div>
      <div class="loading-hint">tap to open 💕</div>
    </div>
  </div>

  <!-- ══ SCENE 1: TOTORO ══ -->
  <div id="scene-totoro" class="scene">
    <div class="cloud" style="width:115px;height:38px;top:7%;--dur:52s;left:-115px;opacity:0.88">
      <div class="c-bump" style="width:55px;height:55px;top:-24px;left:18px"></div>
      <div class="c-bump" style="width:38px;height:38px;top:-14px;left:56px"></div>
    </div>
    <div class="cloud" style="width:88px;height:28px;top:19%;--dur:68s;left:-88px;animation-delay:-22s;opacity:0.72">
      <div class="c-bump" style="width:42px;height:42px;top:-18px;left:14px"></div>
    </div>
    <div class="cloud" style="width:98px;height:33px;top:4%;--dur:44s;left:-98px;animation-delay:-14s">
      <div class="c-bump" style="width:48px;height:48px;top:-21px;left:16px"></div>
      <div class="c-bump" style="width:34px;height:34px;top:-13px;left:48px"></div>
    </div>
    <svg class="treeline" viewBox="0 0 400 160" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="38" cy="118" rx="28" ry="48" fill="#b06080" opacity="0.55" />
      <ellipse cx="78" cy="108" rx="33" ry="58" fill="#9a5070" opacity="0.65" />
      <ellipse cx="338" cy="112" rx="30" ry="52" fill="#b06080" opacity="0.55" />
      <ellipse cx="368" cy="106" rx="26" ry="50" fill="#9a5070" opacity="0.65" />
      <ellipse cx="18" cy="133" rx="20" ry="38" fill="#c07090" />
      <ellipse cx="58" cy="126" rx="26" ry="46" fill="#b06080" />
      <ellipse cx="98" cy="130" rx="22" ry="42" fill="#c07090" />
      <ellipse cx="298" cy="128" rx="23" ry="43" fill="#c07090" />
      <ellipse cx="338" cy="123" rx="28" ry="48" fill="#b06080" />
      <ellipse cx="378" cy="128" rx="24" ry="44" fill="#c07090" />
      <ellipse cx="200" cy="98" rx="48" ry="86" fill="#8a4060" />
      <ellipse cx="176" cy="113" rx="38" ry="68" fill="#9a4e6e" opacity="0.8" />
      <ellipse cx="224" cy="110" rx="40" ry="70" fill="#843c5c" opacity="0.8" />
      <circle cx="185" cy="60" r="5" fill="#f9d0e0" opacity="0.7" />
      <circle cx="210" cy="50" r="4" fill="#f9d0e0" opacity="0.6" />
      <circle cx="230" cy="70" r="3" fill="#f9d0e0" opacity="0.5" />
      <circle cx="170" cy="75" r="4" fill="#f9d0e0" opacity="0.6" />
      <circle cx="200" cy="45" r="6" fill="#f9d0e0" opacity="0.5" />
    </svg>
    <div class="totoro-speech-wrap">
      <div id="totoro-bubble" onclick="advanceTotoroSpeech()">
        <p id="totoro-speech-text">*Yawn* TAP ME! I have things to tell you!</p>
        <div class="bubble-tap-hint" id="bubble-tap-hint">tap to continue ✦</div>
      </div>
    </div>
    <div class="totoro-container">
      <svg class="totoro-svg" viewBox="0 0 200 240">
        <path d="M 55,75 Q 45,25 70,38 Q 80,48 78,75 Z" fill="#71797e" stroke="#4a4e51" stroke-width="3" />
        <path d="M 145,75 Q 155,25 130,38 Q 120,48 122,75 Z" fill="#71797e" stroke="#4a4e51" stroke-width="3" />
        <path d="M 58,70 Q 52,40 68,48 Q 72,55 72,70 Z" fill="#dfdfdf" />
        <path d="M 142,70 Q 148,40 132,48 Q 128,55 128,70 Z" fill="#dfdfdf" />
        <path
          d="M 40,110 C 35,70 165,70 160,110 C 170,160 175,230 150,230 C 120,231 80,231 50,230 C 25,230 30,160 40,110 Z"
          fill="#71797e" stroke="#4a4e51" stroke-width="4" />
        <path d="M 55,145 C 50,115 150,115 145,145 C 150,185 145,225 100,225 C 55,225 50,185 55,145 Z" fill="#fdfbf7" />
        <path d="M 80,135 Q 90,125 100,135" fill="none" stroke="#71797e" stroke-width="5" stroke-linecap="round" />
        <path d="M 105,135 Q 115,125 125,135" fill="none" stroke="#71797e" stroke-width="5" stroke-linecap="round" />
        <path d="M 68,155 Q 78,145 88,155" fill="none" stroke="#71797e" stroke-width="5" stroke-linecap="round" />
        <path d="M 95,155 Q 105,145 115,155" fill="none" stroke="#71797e" stroke-width="5" stroke-linecap="round" />
        <path d="M 122,155 Q 132,145 142,155" fill="none" stroke="#71797e" stroke-width="5" stroke-linecap="round" />
        <circle cx="75" cy="90" r="10" fill="white" stroke="#4a4e51" stroke-width="1.5" />
        <circle cx="75" cy="90" r="4" fill="black" />
        <circle cx="125" cy="90" r="10" fill="white" stroke="#4a4e51" stroke-width="1.5" />
        <circle cx="125" cy="90" r="4" fill="black" />
        <circle cx="73" cy="88" r="1.5" fill="white" />
        <circle cx="123" cy="88" r="1.5" fill="white" />
        <polygon points="94,88 106,88 100,94" fill="black" />
        <line x1="45" y1="98" x2="15" y2="95" stroke="black" stroke-width="2.5" stroke-linecap="round" />
        <line x1="45" y1="104" x2="10" y2="104" stroke="black" stroke-width="2.5" stroke-linecap="round" />
        <line x1="45" y1="110" x2="18" y2="113" stroke="black" stroke-width="2.5" stroke-linecap="round" />
        <line x1="155" y1="98" x2="185" y2="95" stroke="black" stroke-width="2.5" stroke-linecap="round" />
        <line x1="155" y1="104" x2="190" y2="104" stroke="black" stroke-width="2.5" stroke-linecap="round" />
        <line x1="155" y1="110" x2="182" y2="113" stroke="black" stroke-width="2.5" stroke-linecap="round" />
        <path id="totoro-mouth" d="M 90,104 Q 100,109 110,104" fill="none" stroke="black" stroke-width="3"
          stroke-linecap="round" />
        <ellipse cx="60" cy="102" rx="7" ry="3.5" fill="#ffa8a8" opacity="0.6" />
        <ellipse cx="140" cy="102" rx="7" ry="3.5" fill="#ffa8a8" opacity="0.6" />
        <path d="M 38,130 C 20,150 18,180 35,190" fill="none" stroke="#71797e" stroke-width="12"
          stroke-linecap="round" />
        <path d="M 162,130 C 180,150 182,180 165,190" fill="none" stroke="#71797e" stroke-width="12"
          stroke-linecap="round" />
      </svg>
    </div>
    <div class="ground-strip"></div>
    <button class="scene-btn" id="totoro-next-btn" onclick="goToScene('letter')"
      style="animation: none; opacity: 0; pointer-events: none;">
      read my letter 💌
    </button>
  </div>

  <!-- ══ SCENE 2: LETTER ══ -->
  <div id="scene-letter" class="scene">
    <div class="paper-sheet">
      <span class="letter-deco ld-1">🌸</span>
      <span class="letter-deco ld-2">💜</span>
      <span class="letter-deco ld-3">🌸</span>
      <span class="letter-deco ld-4">💜</span>
      <div class="letter-date" id="letter-date"></div>
      <div class="letter-salutation" id="letter-salutation"></div>
      <div class="letter-body" id="letter-body"></div>
      <div class="letter-closing" id="letter-closing"></div>
      <div class="letter-signature" id="letter-signature"></div>
    </div>

    <!-- control buttons: skip + replay -->
    <div class="letter-controls" id="letter-controls">
      <button class="letter-ctrl-btn" id="skip-btn" onclick="skipLetter()" style="animation-delay:0s">skip to end
        ⏩</button>
      <button class="letter-ctrl-btn" id="replay-btn" onclick="replayLetter()"
        style="display:none;animation-delay:0.1s">replay ↺</button>
    </div>

    <button class="letter-action-btn" id="letter-next-btn" onclick="goToScene('lantern')">
      make a wish 🏮
    </button>
  </div>

  <!-- ══ SCENE 3: LANTERN ══ -->
  <div id="scene-lantern" class="scene">
    <div class="lantern-stars" id="lantern-stars"></div>
    <div class="lantern-title">make a wish 🏮</div>
    <div class="lantern-sub">write something in your heart,<br>then let it fly to the stars</div>
    <div class="wish-input-wrap">
      <input type="text" class="wish-input" id="wish-input" placeholder="type your wish here…" maxlength="60"
        autocomplete="off" autocorrect="off" spellcheck="false" />
      <div class="wish-btn-row">
        <button class="release-btn" onclick="releaseLantern()">release ✦</button>
        <button class="view-wishes-btn" id="view-wishes-btn" onclick="openGallery()">view wishes 🏮</button>
      </div>
    </div>
    <div class="wish-log" id="wish-log"></div>
    <button class="lantern-action-btn" id="lantern-next-btn" onclick="goToScene('finale')">
      one more thing 🌟
    </button>
  </div>

  <!-- ══ SCENE 4: FINALE ══ -->
  <div id="scene-finale" class="scene">
    <div class="lantern-stars" id="finale-stars"></div>
    <div class="finale-totoro">
      <svg class="totoro-svg" viewBox="0 0 200 240">
        <path d="M 55,75 Q 45,25 70,38 Q 80,48 78,75 Z" fill="#71797e" stroke="#4a4e51" stroke-width="3" />
        <path d="M 145,75 Q 155,25 130,38 Q 120,48 122,75 Z" fill="#71797e" stroke="#4a4e51" stroke-width="3" />
        <path d="M 58,70 Q 52,40 68,48 Q 72,55 72,70 Z" fill="#dfdfdf" />
        <path d="M 142,70 Q 148,40 132,48 Q 128,55 128,70 Z" fill="#dfdfdf" />
        <path
          d="M 40,110 C 35,70 165,70 160,110 C 170,160 175,230 150,230 C 120,231 80,231 50,230 C 25,230 30,160 40,110 Z"
          fill="#71797e" stroke="#4a4e51" stroke-width="4" />
        <path d="M 55,145 C 50,115 150,115 145,145 C 150,185 145,225 100,225 C 55,225 50,185 55,145 Z" fill="#fdfbf7" />
        <path d="M 80,135 Q 90,125 100,135" fill="none" stroke="#71797e" stroke-width="5" stroke-linecap="round" />
        <path d="M 105,135 Q 115,125 125,135" fill="none" stroke="#71797e" stroke-width="5" stroke-linecap="round" />
        <path d="M 68,155 Q 78,145 88,155" fill="none" stroke="#71797e" stroke-width="5" stroke-linecap="round" />
        <path d="M 95,155 Q 105,145 115,155" fill="none" stroke="#71797e" stroke-width="5" stroke-linecap="round" />
        <path d="M 122,155 Q 132,145 142,155" fill="none" stroke="#71797e" stroke-width="5" stroke-linecap="round" />
        <circle cx="75" cy="90" r="10" fill="white" stroke="#4a4e51" stroke-width="1.5" />
        <circle cx="75" cy="90" r="4" fill="black" />
        <circle cx="125" cy="90" r="10" fill="white" stroke="#4a4e51" stroke-width="1.5" />
        <circle cx="125" cy="90" r="4" fill="black" />
        <circle cx="73" cy="88" r="1.5" fill="white" />
        <circle cx="123" cy="88" r="1.5" fill="white" />
        <polygon points="94,88 106,88 100,94" fill="black" />
        <line x1="45" y1="98" x2="15" y2="95" stroke="black" stroke-width="2.5" stroke-linecap="round" />
        <line x1="45" y1="104" x2="10" y2="104" stroke="black" stroke-width="2.5" stroke-linecap="round" />
        <line x1="45" y1="110" x2="18" y2="113" stroke="black" stroke-width="2.5" stroke-linecap="round" />
        <line x1="155" y1="98" x2="185" y2="95" stroke="black" stroke-width="2.5" stroke-linecap="round" />
        <line x1="155" y1="104" x2="190" y2="104" stroke="black" stroke-width="2.5" stroke-linecap="round" />
        <line x1="155" y1="110" x2="182" y2="113" stroke="black" stroke-width="2.5" stroke-linecap="round" />
        <path id="totoro-mouth" d="M 90,104 Q 100,109 110,104" fill="none" stroke="black" stroke-width="3"
          stroke-linecap="round" />
        <ellipse cx="60" cy="102" rx="7" ry="3.5" fill="#ffa8a8" opacity="0.6" />
        <ellipse cx="140" cy="102" rx="7" ry="3.5" fill="#ffa8a8" opacity="0.6" />
        <path d="M 38,130 C 20,150 18,180 35,190" fill="none" stroke="#71797e" stroke-width="12"
          stroke-linecap="round" />
        <path d="M 162,130 C 180,150 182,180 165,190" fill="none" stroke="#71797e" stroke-width="12"
          stroke-linecap="round" />
      </svg>
    </div>
    <div class="finale-text" id="finale-text"></div>
    <div class="finale-sub">one month down. many moments to go. 🌸</div>
    <div class="finale-hearts">
      <span class="finale-heart" style="--delay:0s">💜</span>
      <span class="finale-heart" style="--delay:0.2s">🌸</span>
      <span class="finale-heart" style="--delay:0.4s">💜</span>
    </div>
    <button class="replay-btn" onclick="replayFromStart()">↩ experience again</button>
  </div>

  <script src="script.js"></script>
</body>

</html>
